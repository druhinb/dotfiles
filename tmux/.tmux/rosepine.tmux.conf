## Rose Pine â€” Angular Aesthetic Theme
## ---------------------------------------------------------

# 1. Palette (Rose Pine)
rose_base="#191724"
rose_surface="#1f1d2e"
rose_overlay="#26233a"
rose_muted="#6e6a86"
rose_subtle="#908caa"
rose_text="#e0def4"
rose_love="#eb6f92"
rose_gold="#f6c177"
rose_rose="#ebbcba"
rose_pine="#31748f"
rose_foam="#9ccfd8"
rose_iris="#c4a7e7"
rose_highlight_low="#21202e"
rose_highlight_med="#403d52"
rose_highlight_high="#524f67"

# 2. General Status Styling
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 1

# Sets the default background to match Rose Pine Base, text to Text
set -g status-style "bg=${rose_base},fg=${rose_text}"

# Message styling (command line)
set -g message-style "bg=${rose_overlay},fg=${rose_text}"

# Pane borders
set -g pane-border-style "fg=${rose_highlight_med}"
set -g pane-active-border-style "fg=${rose_rose}"

# 3. Angular Window Styling
# We set the separator to empty because we handle spacing in the format strings
setw -g window-status-separator ""

# Inactive Window: Transparent background, subtle text
# Format: Index î‚± Name
setw -g window-status-format "#[fg=${rose_subtle},bg=${rose_base}]  #I î‚± #W  "

# Active Window: Rose background, base text, sharp arrows
# Format: î‚° Index î‚± Name î‚°
setw -g window-status-current-format "#[fg=${rose_base},bg=${rose_rose}]î‚°#[fg=${rose_base},bg=${rose_rose},bold] #I î‚± #W #[fg=${rose_rose},bg=${rose_base},nobold,nounderscore,noitalics]î‚°"

# 4. Status Left (Session Name)
# Logic: If prefix is pressed, background is Gold. Otherwise, Foam.
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=${rose_base}#,bg=${rose_gold}#,bold],#[fg=${rose_base}#,bg=${rose_foam}#,bold]} #S #{?client_prefix,#[fg=${rose_gold}#,bg=${rose_base}#,nobold],#[fg=${rose_foam}#,bg=${rose_base}#,nobold]}î‚°"

# 5. Status Right (Time & Host)
# Logic: Overlay block (Time) -> Iris block (Host)
set -g status-right-length 100
set -g status-right "#[fg=${rose_overlay},bg=${rose_base}]î‚²#[fg=${rose_text},bg=${rose_overlay}] %Y-%m-%d î‚³ %H:%M #[fg=${rose_iris},bg=${rose_overlay}]î‚²#[fg=${rose_base},bg=${rose_iris},bold] #h "
