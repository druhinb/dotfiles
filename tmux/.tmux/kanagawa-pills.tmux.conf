## Kanagawa â€” Modern Pills Theme
## ---------------------------------------------------------

# 1. Palette (Kanagawa Wave)
kanagawa_bg="#1F1F28"
kanagawa_fg="#DCD7BA"
kanagawa_blue="#7E9CD8"
kanagawa_green="#98BB6C"
kanagawa_pink="#D27E99"
kanagawa_orange="#FF9E64"
kanagawa_violet="#957FB8"
kanagawa_yellow="#E6C384"
kanagawa_gray="#727169"
kanagawa_dark_gray="#2A2A37"

# 2. General Status Styling
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 1

# Background matches Kanagawa Base, text matches FujiWhite
set -g status-style "bg=${kanagawa_bg},fg=${kanagawa_fg}"

# Message styling
set -g message-style "bg=${kanagawa_dark_gray},fg=${kanagawa_fg}"

# Pane borders
set -g pane-border-style "fg=${kanagawa_dark_gray}"
set -g pane-active-border-style "fg=${kanagawa_blue}"

# 3. Window Styling (Pills)
setw -g window-status-separator " "

# Inactive Window: Text only, subtle gray
setw -g window-status-format "#[fg=${kanagawa_gray},bg=${kanagawa_bg}] #I #W "

# Active Window: Blue Pill
# î‚¶ (fg=blue, bg=base) -> Content (fg=base, bg=blue) -> î‚´ (fg=blue, bg=base)
setw -g window-status-current-format "#[fg=${kanagawa_blue},bg=${kanagawa_bg}]î‚¶#[fg=${kanagawa_bg},bg=${kanagawa_blue},bold]#I #W#[fg=${kanagawa_blue},bg=${kanagawa_bg},nobold]î‚´"

# 4. Status Left (Session Name)
# Logic: Pink normally, Yellow if prefix is pressed.
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=${kanagawa_yellow}],#[fg=${kanagawa_pink}]}#[bg=${kanagawa_bg}]î‚¶#{?client_prefix,#[bg=${kanagawa_yellow}],#[bg=${kanagawa_pink}]}#[fg=${kanagawa_bg},bold] #S #{?client_prefix,#[fg=${kanagawa_yellow}],#[fg=${kanagawa_pink}]}#[bg=${kanagawa_bg},nobold]î‚´"

# 5. Status Right (Time & Host)
# Time (Green Pill) -> Host (Violet Pill)
set -g status-right-length 100
set -g status-right "#[fg=${kanagawa_green},bg=${kanagawa_bg}]î‚¶#[fg=${kanagawa_bg},bg=${kanagawa_green}] %Y-%m-%d %H:%M #[fg=${kanagawa_green},bg=${kanagawa_bg}]î‚´ #[fg=${kanagawa_violet},bg=${kanagawa_bg}]î‚¶#[fg=${kanagawa_bg},bg=${kanagawa_violet},bold] #h #[fg=${kanagawa_violet},bg=${kanagawa_bg},nobold]î‚´"
