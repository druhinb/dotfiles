## One Dark — Angular aesthetic tmux status theme
# Palette (One Dark)
set -g @onedark_bg       "#282c34"
set -g @onedark_fg       "#abb2bf"
set -g @onedark_blue     "#61afef"
set -g @onedark_cyan     "#56b6c2"
set -g @onedark_green    "#98c379"
set -g @onedark_orange   "#d19a66"
set -g @onedark_yellow   "#e5c07b"
set -g @onedark_purple   "#c678dd"
set -g @onedark_red      "#e06c75"

# Status & message styling
set -g status on
set -g status-interval 5
set -g status-justify left

set -g status-style "bg=#282c34,fg=#abb2bf"
set -g message-style "bg=#282c34,fg=#abb2bf"
set -g message-command-style "bg=#282c34,fg=#abb2bf"

# Pane borders
set -g pane-border-style "fg=#3b4048"
set -g pane-active-border-style "fg=#61afef"

# Use compact separators and an 'angular' feel using powerline glyphs
setw -g window-status-separator ""
setw -g window-status-activity-style "none"

# Window title formats (left: inactive, current: active with angular blocks)
setw -g window-status-format "#[fg=#{@onedark_fg},bg=#{@onedark_bg}] #I  #W "
setw -g window-status-current-format "#[fg=#{@onedark_bg},bg=#{@onedark_blue},bold]#[fg=#{@onedark_bg},bg=#{@onedark_blue},bold] #I  #W #[fg=#{@onedark_blue},bg=#{@onedark_bg}]"

# Left section — session name with an angled badge and prefix indicator
set -g status-left-length 70
set -g status-left "#[fg=#{@onedark_bg},bg=#{@onedark_green},bold]#{?client_prefix, ⌨ , }#[fg=#{@onedark_green},bg=#{@onedark_bg}]#[fg=#{@onedark_fg},bg=#{@onedark_bg}] #S #[fg=#{@onedark_bg},bg=#{@onedark_bg}]"

# Right section — battery + clock + host with angular connectors
set -g status-right-length 170
set -g status-right "#[fg=#{@onedark_fg},bg=#{@onedark_bg}]#{?battery_status,#[fg=#{@onedark_yellow},bg=#{@onedark_bg}] #{battery_percentage} ,}#[fg=#{@onedark_cyan},bg=#{@onedark_bg}]#[fg=#{@onedark_bg},bg=#{@onedark_cyan},bold] %Y-%m-%d  %H:%M #[fg=#{@onedark_blue},bg=#{@onedark_bg}]#[fg=#{@onedark_bg},bg=#{@onedark_blue},bold] #h #[fg=#{@onedark_blue},bg=#{@onedark_bg}]"

# Prefix highlight (re-using prefix-highlight plugin colours)
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_output_prefix ' ⌨ '
set -g @prefix_highlight_copy_mode_attr "fg=#{@onedark_bg},bg=#{@onedark_blue},bold"

# End of onedark-angular theme
