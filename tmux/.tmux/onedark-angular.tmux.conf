## One Dark â€” Angular Aesthetic Theme
## ---------------------------------------------------------

# 1. Palette (One Dark)
onedark_bg="#282c34"
onedark_fg="#abb2bf"
onedark_blue="#61afef"
onedark_cyan="#56b6c2"
onedark_green="#98c379"
onedark_orange="#d19a66"
onedark_yellow="#e5c07b"
onedark_purple="#c678dd"
onedark_red="#e06c75"
onedark_visual_grey="#3e4452"
onedark_comment_grey="#5c6370"

# 2. General Status Styling
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 1

# Sets the default background to match One Dark, text to white
set -g status-style "bg=${onedark_bg},fg=${onedark_fg}"

# Message styling (command line)
set -g message-style "bg=${onedark_visual_grey},fg=${onedark_fg}"

# Pane borders
set -g pane-border-style "fg=${onedark_visual_grey}"
set -g pane-active-border-style "fg=${onedark_blue}"

# 3. Angular Window Styling
# We set the separator to empty because we handle spacing in the format strings
setw -g window-status-separator ""

# Inactive Window: Transparent background, light grey text
# Format: Index î‚± Name
setw -g window-status-format "#[fg=${onedark_fg},bg=${onedark_bg}]  #I î‚± #W  "

# Active Window: Blue background, black text, sharp arrows
# Format: î‚° Index î‚± Name î‚°
setw -g window-status-current-format "#[fg=${onedark_bg},bg=${onedark_blue}]î‚°#[fg=${onedark_bg},bg=${onedark_blue},bold] #I î‚± #W #[fg=${onedark_blue},bg=${onedark_bg},nobold,nounderscore,noitalics]î‚°"

# 4. Status Left (Session Name)
# Logic: If prefix is pressed, background is Yellow. Otherwise, Green.
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=${onedark_bg}#,bg=${onedark_yellow}#,bold],#[fg=${onedark_bg}#,bg=${onedark_green}#,bold]} #S #{?client_prefix,#[fg=${onedark_yellow}#,bg=${onedark_bg}#,nobold],#[fg=${onedark_green}#,bg=${onedark_bg}#,nobold]}î‚°"

# 5. Status Right (Time & Host)
# Logic: Grey block (Time) -> Blue block (Host)
set -g status-right-length 100
set -g status-right "#[fg=${onedark_visual_grey},bg=${onedark_bg}]î‚˛#[fg=${onedark_fg},bg=${onedark_visual_grey}] %Y-%m-%d î‚ł %H:%M #[fg=${onedark_blue},bg=${onedark_visual_grey}]î‚˛#[fg=${onedark_bg},bg=${onedark_blue},bold] #h "