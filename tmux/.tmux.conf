# ==============================================================================
# TERMINAL GRAPHICS & ENVIRONMENT
# ==============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",wezterm:RGB"
set -q -g utf8 on

# Inherit the user's configured shell and start fast non-login panes.
set -g default-shell "${SHELL}"
set -g default-command "${SHELL}"

# Prevent trailing environment drops (critical for remote-nvim path inheritance)
set-option -g update-environment "PATH"

# Eliminate escape delay entirely for instantaneous Neovim mode switching
set -s escape-time 0

set -g mouse on
set-window-option -g automatic-rename off
set-window-option -g mode-keys vi

# ==============================================================================
# KEYBINDINGS & WINDOW MANAGEMENT
# ==============================================================================
# Change prefix to Ctrl + B
set -g prefix C-b
unbind C-a
bind-key C-b send-prefix
bind-key L new-window -n "local" "${SHELL}"

# Reload configuration inline
unbind r
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded."

# Context-aware splits (preserves current working directory)
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Prefix + Ctrl-g: open Claude Code beside the current pane.
# Unprefixed Ctrl-g still reaches Claude's external-editor workflow.
bind C-g split-window -h -c "#{pane_current_path}" "exec claude"

# Fine-grained pane resizing (JKLH)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Clipboard: OSC 52 passthrough for seamless copy over SSH/mosh/nested terminals
set -g set-clipboard on
set -g allow-passthrough on

# Copy-mode optimizations
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Standard window creation keeps the current working directory.
# The zsh tmux-ssh helper is the canonical remote-session flow.
bind c new-window -c "#{pane_current_path}"

# ==============================================================================
# PLUGIN CONFIGURATIONS (Must sit above TPM execution)
# ==============================================================================
# FZF Plugin Configuration
set -g @tmux-fzf-launch-key 'F'
set -g @tmux-fzf-options '-p -w 80% -h 80% -m'

# Manual session persistence (Prefix + Ctrl-s / Prefix + Ctrl-r).
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-strategy-nvim 'session'

# Lightweight status: session, windows, and time only.
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-position bottom
set -g status-justify left
set -g status-interval 15
set -g status-left-length 30
set -g status-right-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] "
set -g status-right "#[fg=#6c7086]#I:#W #[fg=#cdd6f4]%a %b %d %H:%M "
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#cdd6f4,bold] #I:#W "
set -g window-status-separator ""

# ==============================================================================
# TMUX PLUGIN MANAGER DECLARATIONS
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'sainnhe/tmux-fzf'

# TPM is the single plugin installation and loading path.
run '~/.tmux/plugins/tpm/tpm'
