# ==============================================================================
# TERMINAL GRAPHICS & ENVIRONMENT
# ==============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",wezterm:RGB"
set -q -g utf8 on

set -g default-shell /bin/zsh
# Bypass implicit login shell wrappers for sub-millisecond pane spawning
set -g default-command "${SHELL}"

# Prevent trailing environment drops (critical for remote-nvim path inheritance)
set-option -g update-environment "PATH"

# Eliminate escape delay entirely for instantaneous Neovim mode switching
set -s escape-time 0

set -g mouse on
set-window-option -g automatic-rename off
set-window-option -g mode-keys vi

# ==============================================================================
# KEYBINDINGS & WINDOW MANAGEMENT
# ==============================================================================
# Change prefix to Ctrl + B
set -g prefix C-b
unbind C-a
bind-key C-b send-prefix
bind-key L new-window -n "local" "${SHELL}"

# Reload configuration inline
unbind r
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded."

# Context-aware splits (preserves current working directory)
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Fine-grained pane resizing (JKLH)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Clipboard: OSC 52 passthrough for seamless copy over SSH/mosh/nested terminals
set -g set-clipboard on
set -g allow-passthrough on

# Copy-mode optimizations
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ==============================================================================
# DYNAMIC SSH AUTOMATION (Fixed for tmux-sessionist conflict)
# ==============================================================================
# Prefix + Ctrl + s: Prompt for a host and open it in a new window named after that host
bind-key C-s command-prompt -p "SSH to host:" "new-window -n '%1' 'ssh %1'"

# Prefix + Shift + C: Clones connection if window name matches an SSH target
bind-key C new-window -c "#{pane_current_path}" " \
  if-shell 'tmux display-message -p \"#W\" | grep -qE \"@|^[a-zA-Z0-9_-]+$\"' \
    'ssh #{window_name}' \
    '${SHELL}'"

# Standard window creation fallback (Prefix + c) retains local behavior
bind c new-window -c "#{pane_current_path}"

# ==============================================================================
# PLUGIN CONFIGURATIONS (Must sit above TPM execution)
# ==============================================================================
set -g @scratch-command-key 'Tab'
set -g @thumbs-osc52 1

# FZF Plugin Configuration
set -g @tmux-fzf-launch-key 'F'
set -g @tmux-fzf-options '-p -w 80% -h 80% -m'

# Session Persistence (Resurrect & Continuum)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Theme / Statusline (catppuccin mocha pills, no special font needed)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-position bottom
set -g status-justify centre
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 60

# Left: session, cpu, ram pills
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] #[bg=#313244,fg=#a6e3a1] cpu #(top -l1 -n0 -s0 | awk '/CPU usage/{gsub(/%/,\"\",$7);printf \"%\%\",100-$7}') #[bg=#1e1e2e] #[bg=#313244,fg=#fab387] ram #(memory_pressure 2>/dev/null | awk '/free percentage/{printf \"%\%\",100-$5}') #[bg=#1e1e2e]"

# Right: date, time pills
set -g status-right "\
#[bg=#313244,fg=#cba6f7] %a %b %d \
#[bg=#1e1e2e] \
#[bg=#89b4fa,fg=#1e1e2e,bold] %I:%M %p #[bg=#1e1e2e]"

# Window list
set -g window-status-format "#[bg=#1e1e2e] #[bg=#313244,fg=#6c7086] #I:#W #[bg=#1e1e2e]"
set -g window-status-current-format "#[bg=#1e1e2e] #[bg=#45475a,fg=#cdd6f4,bold] #I:#W #[bg=#1e1e2e]"
set -g window-status-separator ""

# ==============================================================================
# TMUX PLUGIN MANAGER DECLARATIONS
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'toddyamakawa/tmux-scratchpad'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'

# Absolute termination line (Executes all logic registered above)
run '~/.tmux/plugins/tpm/tpm'
